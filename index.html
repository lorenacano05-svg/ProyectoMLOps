<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Predicción de Riesgo de ACV</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f2ec;
      --surface:   #ffffff;
      --border:    #e2ddd6;
      --text:      #1a1714;
      --muted:     #7a746c;
      --accent:    #c0392b;
      --accent-lo: #fdf0ef;
      --safe:      #1a6b3c;
      --safe-lo:   #edf7f2;
      --radius:    12px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px 80px;
    }

    header {
      max-width: 720px;
      margin: 0 auto 40px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.15;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
    }

    header h1 em {
      font-style: italic;
      color: var(--accent);
    }

    header p {
      font-size: 15px;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.6;
    }

    #modelo-badge {
      display: inline-block;
      margin-top: 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      background: var(--border);
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: 0.3px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      max-width: 720px;
      margin: 0 auto 24px;
    }

    .card h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 540px) { .grid { grid-template-columns: 1fr; } }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.3px;
    }

    input[type="number"],
    select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      background: var(--bg);
      transition: border-color 0.15s, box-shadow 0.15s;
      appearance: none;
      -webkit-appearance: none;
    }

    input[type="number"]:focus,
    select:focus {
      outline: none;
      border-color: var(--text);
      box-shadow: 0 0 0 3px rgba(26,23,20,0.08);
    }

    .hint {
      font-size: 11px;
      color: var(--muted);
      font-weight: 300;
    }

    .toggle-group {
      display: flex;
      gap: 8px;
    }

    .toggle-group input { display: none; }

    .toggle-group label {
      flex: 1;
      text-align: center;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 400;
      color: var(--text);
      background: var(--bg);
      transition: all 0.15s;
    }

    .toggle-group input:checked + label {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.2px;
    }

    button[type="submit"]:hover  { opacity: 0.88; }
    button[type="submit"]:active { transform: scale(0.99); }
    button[type="submit"]:disabled { opacity: 0.4; cursor: not-allowed; }

    #resultado {
      max-width: 720px;
      margin: 0 auto;
      display: none;
    }

    .resultado-card {
      border-radius: var(--radius);
      padding: 32px;
      border: 1px solid;
    }

    .resultado-card.alto {
      background: var(--accent-lo);
      border-color: #f5c6c3;
    }

    .resultado-card.bajo {
      background: var(--safe-lo);
      border-color: #b7dfc8;
    }

    .resultado-riesgo {
      font-family: 'DM Serif Display', serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .resultado-riesgo.alto { color: var(--accent); }
    .resultado-riesgo.bajo { color: var(--safe); }

    .resultado-titulo {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      line-height: 1.2;
      margin-bottom: 16px;
    }

    .resultado-prob {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .resultado-msg {
      font-size: 15px;
      line-height: 1.6;
      font-weight: 300;
      padding-top: 16px;
      border-top: 1px solid rgba(0,0,0,0.08);
    }

    .resultado-modelo {
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
    }

    .loader {
      display: none;
      text-align: center;
      padding: 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-card {
      background: #fff5f5;
      border: 1px solid #fcc;
      border-radius: var(--radius);
      padding: 20px 24px;
      color: var(--accent);
      font-size: 14px;
    }
  </style>
</head>
<body>

<header>
  <h1>Predicción de riesgo<br/>de <em>ACV</em></h1>
  <p>Ingresa los datos clínicos y sociales del paciente para estimar el riesgo de accidente cerebrovascular.</p>
  <span id="modelo-badge">Cargando modelo...</span>
</header>

<form id="form-paciente">

  <!-- Datos personales -->
  <div class="card">
    <h2>Datos personales</h2>
    <div class="grid">

      <div class="field">
        <label>Género</label>
        <select name="gender" required>
          <option value="">Seleccionar...</option>
          <option value="Male">Masculino</option>
          <option value="Female">Femenino</option>
          <option value="Other">Otro</option>
        </select>
      </div>

      <div class="field">
        <label>Edad (años)</label>
        <input type="number" name="age" min="0" max="120" step="0.5" placeholder="Ej: 67" required/>
      </div>

      <div class="field">
        <label>¿Alguna vez estuvo casado/a?</label>
        <div class="toggle-group">
          <input type="radio" name="ever_married" id="married-yes" value="Yes" required/>
          <label for="married-yes">Sí</label>
          <input type="radio" name="ever_married" id="married-no" value="No"/>
          <label for="married-no">No</label>
        </div>
      </div>

      <div class="field">
        <label>Tipo de trabajo</label>
        <select name="work_type" required>
          <option value="">Seleccionar...</option>
          <option value="Private">Sector privado</option>
          <option value="Self-employed">Independiente</option>
          <option value="Govt_job">Sector público</option>
          <option value="children">Niño/a</option>
          <option value="Never_worked">Nunca ha trabajado</option>
        </select>
      </div>

      <div class="field">
        <label>Tipo de residencia</label>
        <div class="toggle-group">
          <input type="radio" name="Residence_type" id="res-urban" value="Urban" required/>
          <label for="res-urban">Urbana</label>
          <input type="radio" name="Residence_type" id="res-rural" value="Rural"/>
          <label for="res-rural">Rural</label>
        </div>
      </div>

      <div class="field">
        <label>Estado de fumador</label>
        <select name="smoking_status" required>
          <option value="">Seleccionar...</option>
          <option value="never smoked">Nunca fumó</option>
          <option value="formerly smoked">Ex fumador/a</option>
          <option value="smokes">Fuma actualmente</option>
          <option value="Unknown">Desconocido</option>
        </select>
      </div>

    </div>
  </div>

  <!-- Datos clínicos -->
  <div class="card">
    <h2>Datos clínicos</h2>
    <div class="grid">

      <div class="field">
        <label>Hipertensión</label>
        <div class="toggle-group">
          <input type="radio" name="hypertension" id="hiper-si" value="1" required/>
          <label for="hiper-si">Sí</label>
          <input type="radio" name="hypertension" id="hiper-no" value="0"/>
          <label for="hiper-no">No</label>
        </div>
      </div>

      <div class="field">
        <label>Enfermedad cardíaca</label>
        <div class="toggle-group">
          <input type="radio" name="heart_disease" id="heart-si" value="1" required/>
          <label for="heart-si">Sí</label>
          <input type="radio" name="heart_disease" id="heart-no" value="0"/>
          <label for="heart-no">No</label>
        </div>
      </div>

      <div class="field">
        <label>Nivel promedio de glucosa (mg/dL)</label>
        <input type="number" name="avg_glucose_level" min="0" max="500" step="0.01" placeholder="Ej: 228.69" required/>
        <span class="hint">Valor en ayunas o promedio registrado</span>
      </div>

      <div class="field">
        <label>Índice de masa corporal (BMI)</label>
        <input type="number" name="bmi" min="0" max="100" step="0.1" placeholder="Ej: 36.6" required/>
        <span class="hint">Peso (kg) / Altura² (m)</span>
      </div>

    </div>
  </div>

  <!-- Botón -->
  <div style="max-width:720px; margin: 0 auto;">
    <button type="submit">Calcular riesgo de ACV</button>
  </div>

</form>

<!-- Loader -->
<div class="loader" id="loader">
  <span class="spinner"></span> Calculando predicción...
</div>

<!-- Resultado -->
<div id="resultado"></div>


<script>
  // Cargar info del modelo
  fetch('/modelo-info')
    .then(r => r.json())
    .then(d => {
      const badge = document.getElementById('modelo-badge');
      if (d.nombre) {
        badge.textContent = `${d.nombre} · Recall clase 1: ${(d.recall_clase_1 * 100).toFixed(1)}% · AUC: ${d.roc_auc.toFixed(3)}`;
      }
    })
    .catch(() => {
      document.getElementById('modelo-badge').textContent = 'Modelo cargado';
    });

  // Enviar formulario
  document.getElementById('form-paciente').addEventListener('submit', async (e) => {
    e.preventDefault();

    const btn    = e.target.querySelector('button[type="submit"]');
    const loader = document.getElementById('loader');
    const res    = document.getElementById('resultado');

    btn.disabled    = true;
    loader.style.display = 'block';
    res.style.display    = 'none';
    res.innerHTML        = '';

    const fd = new FormData(e.target);

    const payload = {
      gender:            fd.get('gender'),
      age:               parseFloat(fd.get('age')),
      hypertension:      parseInt(fd.get('hypertension')),
      heart_disease:     parseInt(fd.get('heart_disease')),
      ever_married:      fd.get('ever_married'),
      work_type:         fd.get('work_type'),
      Residence_type:    fd.get('Residence_type'),
      avg_glucose_level: parseFloat(fd.get('avg_glucose_level')),
      bmi:               parseFloat(fd.get('bmi')),
      smoking_status:    fd.get('smoking_status'),
    };

    try {
      const response = await fetch('/predecir', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.detail || 'Error en el servidor');
      }

      const esAlto  = data.riesgo === 'ALTO';
      const clase   = esAlto ? 'alto' : 'bajo';
      const titulo  = esAlto ? 'Riesgo elevado detectado' : 'Riesgo bajo detectado';
      const prob    = (data.probabilidad_stroke * 100).toFixed(1);

      res.innerHTML = `
        <div class="resultado-card ${clase}">
          <div class="resultado-riesgo ${clase}">Riesgo ${data.riesgo}</div>
          <div class="resultado-titulo">${titulo}</div>
          <div class="resultado-prob">Probabilidad estimada de ACV: <strong>${prob}%</strong></div>
          <div class="resultado-msg">${data.mensaje}</div>
          <div class="resultado-modelo">Modelo: ${data.modelo_usado}</div>
        </div>
      `;

      res.style.display = 'block';
      res.scrollIntoView({ behavior: 'smooth', block: 'start' });

    } catch (err) {
      res.innerHTML = `<div class="error-card">Error: ${err.message}</div>`;
      res.style.display = 'block';
    } finally {
      btn.disabled         = false;
      loader.style.display = 'none';
    }
  });
</script>

</body>
</html>
